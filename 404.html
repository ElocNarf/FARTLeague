<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>F.A.R.T. League</title>
    <script>
      // GitHub Pages SPA redirect trick
      // Converts path to query string so index.html can read it
      var path = window.location.pathname.replace('/FARTLeague', '');
      var search = window.location.search;
      var hash = window.location.hash;
      var redirect = window.location.origin + '/FARTLeague/' +
        '?p=' + encodeURIComponent(path + search) + hash;
      window.location.replace(redirect);
    </script>
  </head>
  <body></body>
</html>
